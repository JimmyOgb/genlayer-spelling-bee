name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Contract linting (GenVM linter via CLI)
  # -------------------------------------------------------
  lint-contract:
    name: Lint Intelligent Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install genlayer CLI
        run: pip install genlayer-cli

      - name: Lint contract
        run: genlayer lint contracts/spelling_bee.py

  # -------------------------------------------------------
  # Contract unit tests (genlayer-test / glsim)
  # -------------------------------------------------------
  test-contract:
    name: Test Intelligent Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run contract tests
        run: pytest tests/ -v --tb=short

  # -------------------------------------------------------
  # Frontend lint + build
  # -------------------------------------------------------
  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
